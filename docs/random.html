<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機文章 | Niugnep 的部落格</title>
    
        <meta name="description" content="隨機挑選一篇 Niugnep 的文章閱讀"> 
        <meta property="og:title" content="隨機文章 | Niugnep 的部落格">
        <meta property="og:description" content="隨機挑選一篇 Niugnep 的文章閱讀">
        <meta name="author" content="Niugnep">
        <link rel="canonical" href="https://stupidestjack.github.io/random.html">
        <meta property="article:published_time" content="2026-06-26">

    <style>/*是的各位，我又找AI幫忙改了*/
:root {
    --bg-color: #262344;         /* 深背景色 */
    --card-bg: #353457;          /* 卡片/區塊背景 */
    --text-primary: #e0e0e0;     /* 主文字顏色 */
    --text-secondary: #b0b0b0;   /* 次要文字顏色 */
    --accent-color: #caaafa;     /* 強調粉紫色 */
    --nav-hover: #45289a;        /* 導覽列懸停深紫 */

    /* ─── 以下為新整理出來的變數 ─── */
    --border-color: #59568f;     /* 帶紫的深色邊框 */
    --text-white: #ffffff;       /* 純白文字 */
    --spoiler-bg: #23213e;       /* 黑幕未懸停時的暗紫色 */
    --spoiler-hover-bg: #2b2852; /* 黑幕懸停時的微亮背景色 */
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    margin: 0;
    line-height: 1.6;
}

/* 頁首樣式 */
header {
    background-color: var(--card-bg);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-color); /* 已改成變數 */
}

.logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--accent-color);
    letter-spacing: 1px;
}

nav a {
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.3s;
}

nav a:hover {
    color: var(--accent-color);
}

/* 主內容區樣式 */
#blog, #comment, #posts-list, #timeline {
max-width: 800px;
margin: 40px auto;
padding: 0 20px;
}

#blog, #comment {
border: var(--border-color) solid 1px; /* 已改成變數 */
border-radius: 30px;
}

#title {
font-size: 2.5rem;
margin-bottom: 0.5rem;
}

/* 頁尾樣式 */
footer {
    text-align: center;
    padding: 2rem;
    margin-top: 50px;
    background-color: var(--card-bg);
    color: var(--text-secondary);
    font-size: 0.9rem;
}

a {
    color: var(--accent-color);
    text-decoration: none;
}

/* 讓 Markdown 裡的圖片不要爆出去 */
img {
    max-width: 100%;
    border-radius: 8px;
}

#home {
max-width: 900px;
margin: 40px auto;
padding: 20px;
}

.hero {
    text-align: center;
    margin-bottom: 50px;
}

article {
    background-color: var(--card-bg);
    border: 1px solid var(--nav-hover);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    transition: transform 0.2s;
}

.post-card:hover {
    transform: translateY(-3px);
}

.post-time {
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.post-description {
    margin-top: 10px;
}

.tags {
    margin-top: 10px;
}

.tag {
    display: inline-block;
    background-color: var(--bg-color);
    color: var(--accent-color);
    padding: 4px 10px;
    margin-right: 8px;
    margin-top: 5px;
    border-radius: 999px;
    font-size: 0.85rem;
}

.des {
    color: var(--text-white); /* 已改成變數 */
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
}

#menu-toggle {
display: none;
}

.hamburger {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

.nav-links {
    display: flex;
    gap: 1rem;
}

/* 手機版 */
@media (max-width: 768px) {
    .hamburger {
        display: block;
        color: var(--text-white); /* 已改成變數 */
    }

    .nav-links {
        display: none;
        position: absolute;
        top: 40px;
        right: 0;
        width: 160px;
        background: var(--bg-color);
        border: 1px solid var(--nav-hover);
        border-radius: 12px;
        padding: 10px;
        z-index: 999;
        flex-direction: column;
    }

    .nav-links a {
        display: block;
        padding: 10px;
        white-space: nowrap;
    }

    #menu-toggle:checked ~ .nav-links {
    display: flex;
    }
}

/* 🌌 藍紫色調優化版黑幕樣式 */
.spoiler {
    background-color: var(--spoiler-bg); /* 已改成變數 */
    color: var(--spoiler-bg);            /* 已改成變數 */
    border-radius: 4px;
    padding: 0 4px;
    transition: color 0.3s ease, background-color 0.3s ease;
}

/* 滑鼠懸停時看清文字 */
.spoiler:hover {
    color: var(--accent-color);
    background-color: var(--spoiler-hover-bg); /* 已改成變數 */
}

hr {
    border: none;  
    height: 1px;   
    background-color: var(--border-color); 
}

td, th {
    border-collapse: collapse;
    border-left: var(--border-color) solid 1px;
    border-top: var(--border-color) solid 1px;
    padding: 10px;
}

table {
    border-collapse: collapse;
    border-right: var(--border-color) solid 1px;
    border-bottom: var(--border-color) solid 1px;
}</style>
</head>
<body>
    
        
<header>
    <div class="logo"><a href="/index.html">Niugnep 的部落格</a></div>
    <nav class="navbar">
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">☰</label>
        <div class="nav-links">
            <a href="https://stupidestjack.github.io/index.html">首頁</a>
            <a href="https://stupidestjack.github.io/all.html">所有文章</a>
            <a href="https://stupidestjack.github.io/random.html">隨機</a>
            <a href="https://stupidestjack.github.io/timeline">時間軸</a>
        </div>
    </nav>
</header>

        <div id="blog" style="text-align: center; padding: 100px 20px;">
            <div id="content">
                <h2 style="font-size: 1.8rem; margin-bottom: 15px;">正在挑選隨機文章...</h2>
                <p style="color: #666; font-size: 1rem;">
                    如果瀏覽器沒有自動跳轉，請點擊 <a id="redirect-link" href="/index.html" style="color: #007acc; text-decoration: underline;">這裡</a>回到首頁。
                </p>
            </div>
        </div>
        
        <script>
            const posts = [];
            if (posts && posts.length > 0) {
                const randomSlug = posts[Math.floor(Math.random() * posts.length)];
                const targetUrl = "/posts/" + randomSlug + ".html";
                document.getElementById("redirect-link").href = targetUrl;
                window.location.replace(targetUrl);
            } else {
                window.location.replace("/index.html");
            }
        </script>
        
<footer>
    <p>&copy; 2026 Niugnep | 文章基於 CC BY 4.0 授權 | <a href="/rss.xml">RSS</a></p>

</footer>

        
</body>
</html>
